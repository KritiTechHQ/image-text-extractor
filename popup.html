<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 250px;
      font-family: Arial, sans-serif;
      padding: 10px;
      margin: 0;
      text-align: center;
    }
    h3 { margin-bottom: 10px; color: #333; }
    button {
      background-color: #007BFF;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background-color: #0056b3; }
    #output { margin-top: 10px; font-size: 14px; color: #555; }
  </style>
</head>
<body>
  <h3>Kriti Extract</h3>
  <button id="actionBtn">Extract Screen Text</button>
  <div id="output">Click the button to scan.</div>

  <script src="popup.js"></script>
</body>
</html>
